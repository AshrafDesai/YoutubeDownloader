<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Styles similar to index.html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #6b7b8c, #2c3e50);
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            color: #333;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            font-size: 1rem;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .btn {
            background-color: #4CAF50;
            color: #fff;
            padding: 15px 30px;
            width: 100%;
            font-size: 1.2rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #45a049;
        }

        .footer {
            margin-top: 30px;
            font-size: 1rem;
            color: #888;
        }

        .footer a {
            color: #4CAF50;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive design */
        @media (max-width: 1024px) {
            .container {
                max-width: 90%;
            }
        }

        @media (max-width: 768px) {
            .container {
                max-width: 90%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Set New Password</h2>
        <form method="POST">
            <div class="input-group">
                <label for="new-password">New Password</label>
                <input type="password" name="new-password" id="new-password" required>
            </div>
            <button type="submit" class="btn">Set Password</button>
        </form>
        <div class="footer">
            <p>Back to <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>
</body>

</html>
