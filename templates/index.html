<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f4;
        }
        .container {
            margin-top: 50px;
        }
        #progress-bar-container {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center">YouTube Video Downloader</h2>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="alert alert-danger">
        <ul>
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label for="url">YouTube URL:</label>
            <input type="text" class="form-control" id="url" name="url" required>
        </div>

        <div class="form-group">
            <label for="download_type">Download Type:</label>
            <select class="form-control" id="download_type" name="download_type" required>
                <option value="1">Video</option>
                <option value="2">Playlist of Videos</option>
                <option value="3">Audio</option>
                <option value="4">Playlist of Audio Files</option>
            </select>
        </div>

        <div class="form-group">
            <label for="quality_choice">Video Quality:</label>
            <select class="form-control" id="quality_choice" name="quality_choice" required>
                <option value="1">240p</option>
                <option value="2">360p</option>
                <option value="3">480p</option>
                <option value="4">720p</option>
                <option value="5">Best Available</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Start Download</button>
    </form>

    <!-- Progress bar container -->
    <div id="progress-bar-container">
        <h4>Download Progress:</h4>
        <div class="progress">
            <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    // Function to start the progress bar
    function startProgress(videoId) {
        const eventSource = new EventSource(`/progress/${videoId}`);
        eventSource.onmessage = function (e) {
            const progress = parseFloat(e.data);
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = progress + '%';
            progressBar.setAttribute('aria-valuenow', progress);

            if (progress === 100) {
                eventSource.close();
            }
        };

        document.getElementById('progress-bar-container').style.display = 'block';
    }

    // Event listener to fetch formats when URL is entered
    document.getElementById('url').addEventListener('blur', getAvailableFormats);

    function getAvailableFormats() {
        const url = document.getElementById('url').value;
        if (url) {
            fetch('/get_formats', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 'url': url })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    const formatsList = document.getElementById('formats-list');
                    formatsList.innerHTML = '<h4>Available Formats:</h4><ul>';
                    data.forEach(format => {
                        formatsList.innerHTML += `<li>${format.format_id} - ${format.format_note} - ${format.resolution}</li>`;
                    });
                    formatsList.innerHTML += '</ul>';
                }
            })
            .catch(error => {
                console.error('Error fetching formats:', error);
            });
        }
    }
</script>

</body>
</html>
